<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>对比 — OpenODC</title>
  <meta name="theme-color" content="#c85a3a" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;700&family=Inter:wght@300;400;500;600&family=Noto+Serif+SC:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

  <header class="site-header">
    <nav class="nav">
      <a class="brand" href="/"><span class="brand-mark">OpenODC</span></a>
      <div class="nav-links">
        <a href="/gallery.html">样例库</a>
        <a href="/editor.html">编辑器</a>
        <a href="/#standard">标准对照</a>
        <a class="lang-toggle" href="/en/">EN</a>
        <a class="github-link" href="https://github.com/AutoZYX/openodc" target="_blank" rel="noopener">GitHub →</a>
      </div>
    </nav>
  </header>

  <main>
    <section class="page-hero">
      <div class="container">
        <p class="eyebrow">DIFF / COMPARISON</p>
        <h1 class="page-title">多车型 ODC 对比</h1>
        <p class="page-subtitle">并排对比多个 ADS 的 ODC 声明。绿色 = 双方都允许；红色 = 双方都不允许；橙色 = 不一致。</p>
      </div>
    </section>

    <section class="section">
      <div class="container container-wide">
        <div class="compare-picker" id="compare-picker">
          <h3>选择要对比的车型（2–4 个）</h3>
          <div id="picker-grid" class="picker-grid">
            <p class="loading">加载中…</p>
          </div>
          <div class="compare-actions">
            <button class="btn btn-primary" id="run-compare" disabled>开始对比 →</button>
          </div>
        </div>

        <div id="compare-result" class="compare-result" hidden></div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <div class="footer-meta">
        <p><strong>OpenODC v0.1.0</strong> · Apache 2.0 (代码) · CC BY 4.0 (数据)</p>
        <p>维护者：<a href="https://autozyx.com" target="_blank" rel="noopener">张玉新</a> · 吉林大学</p>
      </div>
      <div class="footer-links">
        <a href="https://github.com/AutoZYX/OpenODC" target="_blank" rel="noopener">GitHub</a>
        <a href="/en/">English</a>
        <a href="https://github.com/AutoZYX/OpenODC/blob/main/ARCHITECTURE.md" target="_blank" rel="noopener">Architecture</a>
      </div>
    </div>
  </footer>

  <script type="module" src="/js/compare.js"></script>
</body>
</html>
